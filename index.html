<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>進階網頁資料爬蟲系統 (自動排程與通用版)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [activeTab, setActiveTab] = useState('single'); // 'single', 'schedule', 'custom'
            
            // --- 通用規則狀態 (放在最上層，確保單次和排程都能讀到) ---
            const [customRule, setCustomRule] = useState(
                JSON.stringify({ "tableSelector": "table", "rowSelector": "tr", "paginationSelector": "a.next" }, null, 2)
            );
            const [useCustomRule, setUseCustomRule] = useState(false); // 控制單次爬蟲是否啟用通用規則

            // --- 單次爬蟲狀態 ---
            const [step, setStep] = useState(1);
            const [url, setUrl] = useState('');
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [analysisResult, setAnalysisResult] = useState(null);
            const [previewData, setPreviewData] = useState([]);
            const [previewColumns, setPreviewColumns] = useState([]);
            const [config, setConfig] = useState({
                pagination: true, startPage: 1, endPage: 'last', customEndPage: 9, deepCrawl: true, carbonAnalysis: true 
            });
            const [crawlingProgress, setCrawlingProgress] = useState(0);
            const [isCrawling, setIsCrawling] = useState(false);
            const [downloadUrl, setDownloadUrl] = useState('');
            const [crawlMessage, setCrawlMessage] = useState('');
            const pollIntervalRef = useRef(null);

            // --- 排程中心狀態 ---
            const [schedules, setSchedules] = useState([]);
            const [logs, setLogs] = useState([]);
            const [scheduleForm, setScheduleForm] = useState({ url: '', time: '08:00', webhookUrl: '' });

            // 取得排程與日誌
            const fetchSchedules = async () => {
                try {
                    const res = await fetch('/api/schedules');
                    const data = await res.json();
                    if (data.status === 'success') {
                        setSchedules(data.schedules);
                        setLogs(data.logs);
                    }
                } catch (e) { console.error("無法取得排程資料", e); }
            };

            useEffect(() => {
                if (activeTab === 'schedule') {
                    fetchSchedules();
                }
            }, [activeTab]);

            // 單次分析
            const handleAnalyze = async () => {
                if (!url) return;
                setIsAnalyzing(true);
                try {
                    const response = await fetch(`/api/analyze?url=${encodeURIComponent(url)}&limit=10`);
                    const data = await response.json();
                    if (data.status === 'success') {
                        setAnalysisResult(data.analysisResult);
                        setPreviewData(data.previewData);
                        setPreviewColumns(data.previewData.length > 0 ? Object.keys(data.previewData[0]) : ['提示']);
                    } else throw new Error(data.message);
                } catch (error) {
                    alert(`分析失敗：${error.message}`);
                    setAnalysisResult({ status: 'error' });
                } finally {
                    setIsAnalyzing(false);
                    setStep(2);
                }
            };

            // 啟動單次爬蟲
            const startCrawling = async () => {
                setStep(5);
                setIsCrawling(true);
                setCrawlingProgress(0);
                setDownloadUrl('');
                setCrawlMessage('正在建立任務...');
                try {
                    const actualEndPage = config.endPage === 'custom' ? config.customEndPage : config.endPage;
                    const queryParams = new URLSearchParams({
                        url, pagination: config.pagination, startPage: config.startPage, 
                        endPage: actualEndPage, deepCrawl: config.deepCrawl, carbonAnalysis: config.carbonAnalysis,
                        customRule: useCustomRule ? customRule : "{}" // 關鍵：根據勾選狀態發送規則
                    });
                    const response = await fetch(`/api/crawl?${queryParams.toString()}`);
                    const data = await response.json();

                    if (data.status === "success" && data.task_id) {
                        pollIntervalRef.current = setInterval(async () => {
                            try {
                                const statusRes = await fetch(`/api/crawl/status/${data.task_id}`);
                                const statusData = await statusRes.json();
                                setCrawlingProgress(statusData.progress || 0);
                                setCrawlMessage(statusData.message || '處理中...');
                                if (statusData.status === 'success' || statusData.status === 'error') {
                                    clearInterval(pollIntervalRef.current);
                                    setIsCrawling(false);
                                    if (statusData.status === 'success') setDownloadUrl(statusData.download_url);
                                    else setCrawlMessage("❌ 失敗：" + statusData.message);
                                }
                            } catch (err) {}
                        }, 2000);
                    } else throw new Error(data.message);
                } catch (error) {
                    setIsCrawling(false);
                    setCrawlMessage("⚠️ 啟動失敗：" + error.message);
                }
            };

            // 新增排程
            const handleAddSchedule = async (e) => {
                e.preventDefault();
                try {
                    const res = await fetch('/api/schedule/add', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            url: scheduleForm.url, 
                            cron_time: scheduleForm.time, 
                            webhook_url: scheduleForm.webhookUrl,
                            custom_rule: useCustomRule ? customRule : "{}" // 關鍵：根據勾選狀態發送規則
                        })
                    });
                    const data = await res.json();
                    if (data.status === 'success') {
                        alert('✅ 排程建立成功！');
                        setScheduleForm({ url: '', time: '08:00', webhookUrl: '' });
                        fetchSchedules();
                    } else alert('建立失敗: ' + data.message);
                } catch (err) { alert('連線錯誤'); }
            };

            // 刪除排程
            const handleDeleteSchedule = async (id) => {
                if(!confirm('確定要刪除此排程嗎？')) return;
                try {
                    await fetch(`/api/schedule/${id}`, { method: 'DELETE' });
                    fetchSchedules();
                } catch (err) { alert('刪除失敗'); }
            };

            useEffect(() => { return () => { if (pollIntervalRef.current) clearInterval(pollIntervalRef.current); }; }, []);

            return (
                <div className="min-h-screen bg-slate-50 text-slate-800 font-sans pb-10">
                    {/* Header & Tabs */}
                    <header className="bg-slate-900 text-white shadow-md pt-6 pb-0 px-6 mb-8">
                        <div className="max-w-6xl mx-auto">
                            <div className="flex items-center space-x-4 mb-6">
                                <div className="p-3 bg-blue-500 rounded-lg"><i className="fas fa-spider text-2xl"></i></div>
                                <div>
                                    <h1 className="text-2xl font-bold">進階資料爬蟲中心</h1>
                                    <p className="text-slate-400 text-sm">自動排程 · Webhook通知 · 自訂通用規則</p>
                                </div>
                            </div>
                            <div className="flex space-x-1">
                                <button onClick={() => setActiveTab('single')} className={`px-6 py-3 rounded-t-lg font-medium transition-colors ${activeTab === 'single' ? 'bg-white text-blue-600' : 'bg-slate-800 text-slate-300 hover:bg-slate-700'}`}>
                                    <i className="fas fa-play-circle mr-2"></i> 單次抓取
                                </button>
                                <button onClick={() => setActiveTab('schedule')} className={`px-6 py-3 rounded-t-lg font-medium transition-colors ${activeTab === 'schedule' ? 'bg-white text-blue-600' : 'bg-slate-800 text-slate-300 hover:bg-slate-700'}`}>
                                    <i className="fas fa-clock mr-2"></i> 自動排程紀錄
                                </button>
                                <button onClick={() => setActiveTab('custom')} className={`px-6 py-3 rounded-t-lg font-medium transition-colors ${activeTab === 'custom' ? 'bg-white text-blue-600' : 'bg-slate-800 text-slate-300 hover:bg-slate-700'}`}>
                                    <i className="fas fa-code mr-2"></i> 通用規則設定
                                </button>
                            </div>
                        </div>
                    </header>

                    <div className="max-w-6xl mx-auto px-6">
                        {/* --- 引擎選擇切換區 (全域顯示) --- */}
                        <div className="mb-6 bg-blue-50 border border-blue-200 rounded-lg p-4 flex items-center justify-between">
                            <div>
                                <h3 className="font-bold text-blue-800"><i className="fas fa-cogs mr-2"></i> 當前爬蟲引擎模式</h3>
                                <p className="text-sm text-blue-600 mt-1">
                                    {useCustomRule 
                                        ? "已啟用「通用規則引擎」：適用於抓取任意網站的標準表格。" 
                                        : "已啟用「環保署專用引擎」：適用於碳費深層網頁與六大維度報表分析。"}
                                </p>
                            </div>
                            <label className="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" className="sr-only peer" checked={useCustomRule} onChange={(e) => setUseCustomRule(e.target.checked)} />
                                <div className="w-14 h-7 bg-gray-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-blue-600"></div>
                                <span className="ml-3 text-sm font-bold text-slate-700">{useCustomRule ? '切換為環保署模式' : '切換為通用模式'}</span>
                            </label>
                        </div>

                        {/* --- Tab 1: 單次爬蟲 --- */}
                        {activeTab === 'single' && (
                            <div className="space-y-6 animate-in fade-in duration-300">
                                {step === 1 && (
                                    <div className="bg-white p-8 rounded-xl shadow-sm border border-slate-200">
                                        <h2 className="text-xl font-semibold mb-4"><i className="fas fa-search text-blue-600 mr-2"></i> 目標網址</h2>
                                        <div className="flex space-x-4">
                                            <input type="url" placeholder="輸入要抓取的網址..." className="flex-1 p-4 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" value={url} onChange={(e) => setUrl(e.target.value)} />
                                            <button onClick={handleAnalyze} disabled={!url || isAnalyzing} className="bg-blue-600 hover:bg-blue-700 disabled:bg-slate-400 text-white px-8 py-4 rounded-lg font-medium">
                                                {isAnalyzing ? <i className="fas fa-sync fa-spin mr-2"></i> : <i className="fas fa-bolt mr-2"></i>}
                                                分析網頁
                                            </button>
                                        </div>
                                    </div>
                                )}

                                {(step === 2 || step === 4) && analysisResult && (
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                        <div className="col-span-1 space-y-6">
                                            <div className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
                                                <h3 className="font-semibold mb-4"><i className="fas fa-sliders-h text-blue-600 mr-2"></i> 擷取設定</h3>
                                                <div className="space-y-3">
                                                    <label className="flex items-center space-x-2 text-sm">
                                                        <input type="checkbox" checked={config.pagination} onChange={(e) => setConfig({...config, pagination: e.target.checked})} className="rounded text-blue-600 w-4 h-4" />
                                                        <span>啟用自動換頁</span>
                                                    </label>
                                                    {config.pagination && (
                                                        <div className="flex items-center gap-2 ml-6 text-sm">
                                                            <span>至第</span>
                                                            <select value={config.endPage} onChange={(e) => setConfig({...config, endPage: e.target.value})} className="p-1 border rounded">
                                                                <option value="last">末頁</option>
                                                                <option value="custom">自訂</option>
                                                            </select>
                                                            {config.endPage === 'custom' && <input type="number" value={config.customEndPage} onChange={(e) => setConfig({...config, customEndPage: e.target.value})} className="w-16 p-1 border rounded" />}
                                                        </div>
                                                    )}
                                                    
                                                    {!useCustomRule && (
                                                        <label className="flex items-center space-x-2 text-sm pt-2">
                                                            <input type="checkbox" checked={config.deepCrawl} onChange={(e) => setConfig({...config, deepCrawl: e.target.checked})} className="rounded text-blue-600 w-4 h-4" />
                                                            <span>深層內頁追蹤 (環保署專用)</span>
                                                        </label>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                        <div className="col-span-1 md:col-span-2 bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                                            <div className="flex justify-between items-center mb-4 border-b pb-4">
                                                <h3 className="text-lg font-semibold"><i className="fas fa-eye text-blue-600 mr-2"></i> 資料預覽</h3>
                                                <button onClick={startCrawling} className="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg font-semibold flex items-center shadow-lg transition-transform hover:scale-105">
                                                    <i className="fas fa-play mr-2"></i> 立即啟動任務
                                                </button>
                                            </div>
                                            <div className="overflow-x-auto rounded border border-slate-200 max-h-64">
                                                <table className="w-full text-sm text-left whitespace-nowrap">
                                                    <thead className="bg-slate-50 border-b">
                                                        <tr>{previewColumns.map((col, idx) => <th key={idx} className="px-4 py-2">{col}</th>)}</tr>
                                                    </thead>
                                                    <tbody>
                                                        {previewData.map((row, rowIdx) => (
                                                            <tr key={rowIdx} className="border-b">{previewColumns.map((col, colIdx) => <td key={colIdx} className="px-4 py-2 truncate max-w-xs">{row[col]}</td>)}</tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {step === 5 && (
                                    <div className="bg-white p-8 rounded-xl shadow-sm border border-slate-200 text-center">
                                        <div className="mb-6">
                                            {isCrawling ? (
                                                <div className="relative inline-flex items-center justify-center">
                                                    <svg className="animate-spin h-16 w-16 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                                        <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                                                        <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                                    </svg>
                                                    <span className="absolute text-sm font-bold text-blue-700">{crawlingProgress}%</span>
                                                </div>
                                            ) : (
                                                <i className={`fas ${downloadUrl ? 'fa-check-circle text-green-500' : 'fa-times-circle text-red-500'} text-6xl`}></i>
                                            )}
                                        </div>
                                        <h2 className="text-2xl font-bold mb-2">{isCrawling ? '爬蟲背景執行中...' : (downloadUrl ? '任務完成！' : '任務失敗')}</h2>
                                        <div className="w-full bg-slate-100 rounded-full h-3 mb-6 overflow-hidden max-w-lg mx-auto">
                                            <div className={`h-3 rounded-full transition-all duration-300 ${isCrawling ? 'bg-blue-500' : (downloadUrl ? 'bg-green-500' : 'bg-red-500')}`} style={{ width: `${crawlingProgress}%` }}></div>
                                        </div>
                                        <p className="text-slate-600 mb-6 font-mono text-sm">{crawlMessage}</p>
                                        {!isCrawling && (
                                            <div className="flex justify-center space-x-4">
                                                {downloadUrl && <a href={downloadUrl} className="bg-green-600 hover:bg-green-700 text-white px-8 py-3 rounded-lg font-bold"><i className="fas fa-download mr-2"></i> 下載檔案</a>}
                                                <button onClick={() => setStep(1)} className="bg-slate-200 hover:bg-slate-300 px-6 py-3 rounded-lg font-medium">建立新任務</button>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* --- Tab 2: 排程中心 --- */}
                        {activeTab === 'schedule' && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 animate-in fade-in duration-300">
                                <div className="col-span-1">
                                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 mb-6">
                                        <h3 className="font-bold text-lg mb-4"><i className="fas fa-plus-circle text-blue-600 mr-2"></i> 新增定時排程</h3>
                                        <form onSubmit={handleAddSchedule} className="space-y-4">
                                            <div>
                                                <label className="block text-sm font-medium text-slate-700 mb-1">目標網址</label>
                                                <input type="url" required value={scheduleForm.url} onChange={e => setScheduleForm({...scheduleForm, url: e.target.value})} className="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none text-sm" placeholder="https://..." />
                                            </div>
                                            <div>
                                                <label className="block text-sm font-medium text-slate-700 mb-1">每日執行時間 (24H)</label>
                                                <input type="time" required value={scheduleForm.time} onChange={e => setScheduleForm({...scheduleForm, time: e.target.value})} className="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none text-sm" />
                                            </div>
                                            <div>
                                                <label className="block text-sm font-medium text-slate-700 mb-1">
                                                    Webhook URL (Discord / Slack) <span className="text-xs text-slate-400 font-normal">(選填)</span>
                                                </label>
                                                <input type="text" value={scheduleForm.webhookUrl} onChange={e => setScheduleForm({...scheduleForm, webhookUrl: e.target.value})} className="w-full p-2 border rounded focus:ring-2 focus:ring-purple-500 outline-none text-sm" placeholder="https://discord.com/api/webhooks/..." />
                                            </div>
                                            <button type="submit" className="w-full bg-blue-600 text-white py-2 rounded-lg font-medium hover:bg-blue-700 transition">建立排程</button>
                                        </form>
                                    </div>
                                </div>

                                <div className="col-span-1 lg:col-span-2 space-y-6">
                                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                                        <h3 className="font-bold text-lg mb-4"><i className="fas fa-list text-blue-600 mr-2"></i> 執行中的排程 ({schedules.length})</h3>
                                        {schedules.length === 0 ? (
                                            <p className="text-slate-500 text-sm py-4 text-center border border-dashed rounded-lg">尚無建立任何排程</p>
                                        ) : (
                                            <ul className="divide-y border rounded-lg">
                                                {schedules.map(s => (
                                                    <li key={s.id} className="p-4 flex justify-between items-center hover:bg-slate-50">
                                                        <div>
                                                            <div className="font-medium text-slate-800 truncate w-64 md:w-96" title={s.url}>{s.url}</div>
                                                            <div className="text-sm text-slate-500 mt-1 space-x-2">
                                                                <span className="bg-slate-200 px-2 py-0.5 rounded text-xs font-mono">每天 {s.cron_time}</span>
                                                                <span className={`px-2 py-0.5 rounded text-xs font-bold text-white ${s.custom_rule === "{}" ? 'bg-green-500' : 'bg-blue-500'}`}>
                                                                    {s.custom_rule === "{}" ? '環保署引擎' : '通用引擎'}
                                                                </span>
                                                                {s.webhook_url && <span className="text-purple-600 text-xs"><i className="fas fa-bell"></i> Webhook已啟用</span>}
                                                            </div>
                                                        </div>
                                                        <button onClick={() => handleDeleteSchedule(s.id)} className="text-red-500 hover:text-red-700 p-2"><i className="fas fa-trash"></i></button>
                                                    </li>
                                                ))}
                                            </ul>
                                        )}
                                    </div>

                                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                                        <h3 className="font-bold text-lg mb-4"><i className="fas fa-history text-blue-600 mr-2"></i> 最近執行紀錄 (Logs)</h3>
                                        <div className="overflow-x-auto rounded border border-slate-200 max-h-80">
                                            <table className="w-full text-sm text-left">
                                                <thead className="bg-slate-50 sticky top-0">
                                                    <tr>
                                                        <th className="px-4 py-2">時間</th>
                                                        <th className="px-4 py-2">狀態</th>
                                                        <th className="px-4 py-2">訊息</th>
                                                        <th className="px-4 py-2">檔案</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y">
                                                    {logs.map(log => (
                                                        <tr key={log.id} className="hover:bg-slate-50">
                                                            <td className="px-4 py-2 whitespace-nowrap text-slate-500">{new Date(log.executed_at).toLocaleString()}</td>
                                                            <td className="px-4 py-2">
                                                                <span className={`px-2 py-1 rounded text-xs font-bold ${log.status === 'success' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                                                                    {log.status.toUpperCase()}
                                                                </span>
                                                            </td>
                                                            <td className="px-4 py-2 truncate max-w-[200px]" title={log.message}>{log.message}</td>
                                                            <td className="px-4 py-2">
                                                                {log.file_name && <a href={`/api/download/${log.file_name}`} className="text-blue-600 hover:underline"><i className="fas fa-download"></i> 下載</a>}
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* --- Tab 3: 通用規則設定 --- */}
                        {activeTab === 'custom' && (
                            <div className="bg-white p-8 rounded-xl shadow-sm border border-slate-200 animate-in fade-in duration-300">
                                <div className="flex justify-between items-center mb-6">
                                    <div>
                                        <h2 className="text-xl font-bold"><i className="fas fa-code text-blue-600 mr-2"></i> 通用 CSS 選擇器規則 (JSON)</h2>
                                        <p className="text-sm text-slate-500 mt-1">當您上方切換為「通用引擎模式」時，系統將會依照下方的規則來爬取表格。</p>
                                    </div>
                                </div>
                                
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div>
                                        <textarea 
                                            className="w-full h-80 p-4 font-mono text-sm border border-slate-300 rounded-lg bg-slate-900 text-green-400 focus:ring-2 outline-none"
                                            value={customRule}
                                            onChange={(e) => setCustomRule(e.target.value)}
                                        ></textarea>
                                    </div>
                                    <div className="bg-slate-50 p-6 rounded-lg border border-slate-200">
                                        <h4 className="font-bold text-slate-700 mb-3"><i className="fas fa-book-open mr-2"></i> JSON 規則撰寫指南</h4>
                                        <ul className="space-y-3 text-sm text-slate-600 list-disc list-inside">
                                            <li><code className="bg-slate-200 px-1 rounded">tableSelector</code>: 目標表格的 CSS (例如 `#main-table`)。</li>
                                            <li><code className="bg-slate-200 px-1 rounded">paginationSelector</code>: 下一頁按鈕的 CSS (例如 `a.next`)。</li>
                                        </ul>
                                        <div className="mt-6 p-4 bg-yellow-50 border border-yellow-200 rounded-lg text-sm text-yellow-800">
                                            <strong>注意事項：</strong>
                                            <p className="mt-1">通用引擎會依據您的 CSS Selector 擷取目標表格。請確認您上方的開關是否已經切換到「通用模式」。</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
